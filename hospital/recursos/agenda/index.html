      var img = new Image();
      var blob = new Blob([svg], {type:'image/svg+xml'});
      var url = URL.createObjectURL(blob);
      img.onload = function(){
        var c = document.createElement('canvas');
        c.width = 512; c.height = 512;
        c.getContext('2d').drawImage(img, 0, 0);
        var png = c.toDataURL('image/png');
        URL.revokeObjectURL(url);
        var l = document.createElement('link');
        l.rel = 'apple-touch-icon'; l.href = png;
        document.head.appendChild(l);
        var m = document.createElement('link');
        m.rel = 'manifest';
        var mdata = JSON.stringify({name:'URGlab',short_name:'URGlab',start_url:'./index.html',display:'standalone',background_color:'#0e1a27',theme_color:'#1a6fad',icons:[{src:png,sizes:'512x512',type:'image/png',purpose:'any maskable'}]});
        m.href = URL.createObjectURL(new Blob([mdata],{type:'application/manifest+json'}));
        document.head.appendChild(m);
      };
      img.src = url;
    })();

    <style>
        :root {
            --blue:       #1a6fad;
            --blue-dark:  #145a8f;
            --blue-light: #e8f3fb;
            --teal:       #09c797;
            --teal-dark:  #07a87e;
            --teal-light: #e6faf5;
            --red:        #c0392b;
            --red-light:  #fee2e2;
            --black:      #111111;
            --bg:         #f4f6f9;
            --surface:    #ffffff;

            --display: 'Barlow Condensed', sans-serif;
            --body:    'IBM Plex Sans', sans-serif;
            --mono:    'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ─── HEADER ─────────────────────────────────────────────────── */
        header {
            background: linear-gradient(135deg, #1a7fc8 0%, #1a6fad 100%);
            border-bottom: 3px solid var(--teal);
            padding: 12px 18px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: grid;
            grid-template-columns: 48px 1fr 48px;
            align-items: center;
            gap: 8px;
            min-height: 68px;
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(255,255,255,0.15); border: none;
            cursor: pointer; color: white; transition: background 0.15s;
            text-decoration: none;
        }
        .back-btn:active { background: rgba(255,255,255,0.28); }

        .header-center { text-align: center; }

        .header-supertitle {
            font-family: var(--body);
            font-size: 0.58rem;
            font-weight: 600;
            color: #09c797;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 2px;
        }

        .header-title {
            font-family: var(--display);
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.04em;
            line-height: 1;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* ─── SEARCH ─────────────────────────────────────────────────── */
        .search-wrap {
            background: var(--surface);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-inner {
            position: relative;
            max-width: 480px;
            margin: auto;
        }

        .search-inner input {
            width: 100%;
            padding: 12px 42px 12px 42px;
            background: var(--surface2);
            border: 1.5px solid var(--border-mid);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--body);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-inner input:focus {
            border-color: var(--teal);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(9,199,151,0.12);
        }

        .search-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--text-muted);
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.6rem;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* ─── CONTENT ────────────────────────────────────────────────── */
        .container {
            max-width: 480px;
            margin: auto;
            padding: 16px;
        }

        /* ─── SECTION HEADER ─────────────────────────────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .section-header:first-child { margin-top: 4px; }

        .section-icon { font-size: 1rem; line-height: 1; }

        .section-title {
            font-family: var(--display);
            font-size: 1rem;
            font-weight: 800;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1;
        }

        .section-count {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-left: auto;
            letter-spacing: 0.04em;
        }

        /* ─── CONTACT CARD ───────────────────────────────────────────── */
        .contact-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            transition: all 0.15s;
        }

        .contact-card:active {
            transform: scale(0.99);
            background: var(--blue-light);
        }

        .contact-card.t-crit  { border-left: 4px solid var(--red); }
        .contact-card.t-guard { border-left: 4px solid var(--teal); }
        .contact-card.t-log   { border-left: 4px solid var(--blue); }

        .contact-info { flex: 1; }

        .contact-name {
            font-family: var(--body);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .contact-tag {
            font-family: var(--mono);
            font-size: 0.55rem;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .tag-crit  { background: var(--red-light);  color: var(--red); }
        .tag-guard { background: var(--teal-light); color: var(--teal-dark); }
        .tag-log   { background: var(--blue-light); color: var(--blue-dark); }

        .contact-number {
            font-family: var(--mono);
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--blue-dark);
            white-space: nowrap;
            text-align: right;
        }

        .t-crit .contact-number { color: var(--red); }

        /* ─── NO RESULTS ─────────────────────────────────────────────── */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-family: var(--body);
            font-size: 0.9rem;
        }

        .no-results-icon { font-size: 2.5rem; margin-bottom: 12px; }
    </style>

    const directoryDiv = document.getElementById('directory');
    const searchInput  = document.getElementById('search');
    const clearBtn     = document.getElementById('clear-btn');

    // Seguridad: escapa caracteres HTML especiales antes de insertar en innerHTML
    function escHTML(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render(query = "") {
        directoryDiv.innerHTML = "";
        const q = query.toLowerCase().trim();
        clearBtn.style.display = q ? "flex" : "none";
        let totalResults = 0;

        directoryData.forEach(cat => {
            const filtered = cat.contacts.filter(c =>
                c.s.toLowerCase().includes(q) || c.n.includes(q)
            );
            if (filtered.length === 0) return;
            totalResults += filtered.length;

            const section = document.createElement('div');

            const hdr = document.createElement('div');
            hdr.className = 'section-header';
            hdr.innerHTML = `
                <span class="section-icon">${cat.icon}</span>
                <span class="section-title">${cat.category}</span>
                <span class="section-count">${filtered.length} ext.</span>`;
            section.appendChild(hdr);

            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = `contact-card t-${c.t}`;
                const tagLabel = c.t === 'crit' ? 'Crítico' : c.t === 'guard' ? 'Guardia' : 'Logística';
                card.innerHTML = `
                    <div class="contact-info">
                        <div class="contact-name">${c.s}</div>
                        <span class="contact-tag tag-${c.t}">${tagLabel}</span>
                    </div>
                    <div class="contact-number">${c.n}</div>`;
                section.appendChild(card);
            });

            directoryDiv.appendChild(section);
        });

        if (totalResults === 0) {
            directoryDiv.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">🔍</div>
                    Sin resultados para "<strong>${escHTML(query)}</strong>"
                </div>`;
        }
    }

    function clearSearch() {
        searchInput.value = "";
        render();
        searchInput.focus();
    }

    searchInput.addEventListener('input', e => render(e.target.value));
    render();
</script>
