<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digestivas — URGlab</title>
<link rel="stylesheet" href="../../../fonts.css">
<style>
    :root {
        --bg: #f4f6f9; --surface: #ffffff; --border: rgba(0,0,0,0.09);
        --text: #1a2636; --text-muted: #8898aa;
        --display: 'Barlow Condensed', sans-serif; --body: 'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); font-family: var(--body); min-height: 100svh; }
    header {
        background: linear-gradient(135deg, #1a7fc8 0%, #1a6fad 100%);
        border-bottom: 3px solid #09c797; padding: 12px 18px;
        position: sticky; top: 0; z-index: 1000;
        display: grid; grid-template-columns: 48px 1fr 48px;
        align-items: center; gap: 8px; min-height: 68px;
    }
    .back-btn {
        display: flex; align-items: center; justify-content: center;
        width: 38px; height: 38px; border-radius: 10px;
        background: rgba(255,255,255,0.15); border: none;
        cursor: pointer; color: white; transition: background 0.15s; text-decoration: none;
    }
    .back-btn:active { background: rgba(255,255,255,0.28); }
    .header-center { text-align: center; }
    .header-label { font-family: var(--body); font-size: 0.58rem; font-weight: 600; color: #09c797; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
    .header-title { font-family: var(--display); font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; }
    .header-right { display: flex; align-items: center; justify-content: flex-end; opacity: 0.7; }
    .wip { max-width: 480px; margin: 60px auto; padding: 0 20px; text-align: center; }
    .wip-icon { font-size: 2.8rem; margin-bottom: 16px; }
    .wip-title { font-family: var(--display); font-size: 1.8rem; font-weight: 800; text-transform: uppercase; color: var(--text); margin-bottom: 8px; }
    .wip-sub { color: var(--text-muted); font-size: 0.9rem; }
</style>
</head>
<body>
<header>
    <a class="back-btn" href="../index.html" aria-label="Volver">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="header-center">
        <div class="header-label">Hospital Universitari Joan XXIII</div>
        <div class="header-title">Digestivas</div>
    </div>
    <div class="header-right">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l1-4h4l1 4"/><path d="M4 11v4a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1"/><path d="M13 7c0-1.1.9-2 2-2h2a2 2 0 0 1 2 2v3c0 2.2-1.8 4-4 4h-1"/><path d="M14 14v4a1 1 0 0 0 1 1h1"/><path d="M8 11h5"/><path d="M9 7v4"/></svg>
    </div>
</header>
<div class="wip">
    <div class="wip-icon">🚧</div>
    <div class="wip-title">En desarrollo</div>
    <div class="wip-sub">Los algoritmos digestivos se están construyendo.</div>
</div>
</body>
</html>
